version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: casino_postgres
    environment:
      POSTGRES_DB: casino_db
      POSTGRES_USER: casino_user
      POSTGRES_PASSWORD: casino_secret_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U casino_user -d casino_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casino_network

  redis:
    image: redis:7-alpine
    container_name: casino_redis
    command: redis-server --requirepass casino_redis_2024
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--auth', 'casino_redis_2024', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casino_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casino_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://casino_user:casino_secret_2024@postgres:5432/casino_db
      REDIS_URL: redis://:casino_redis_2024@redis:6379
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_2024
      JWT_EXPIRES_IN: 7d
      INITIAL_BALANCE: '1000'
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - casino_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: casino_frontend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - casino_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  casino_network:
    driver: bridge
